apiVersion: apps/v1
kind: Deployment
 
metadata:
  name: capstone-deployment
 
spec:
  replicas: 2
 
  selector:
    matchLabels:
      app: capstone
 
  template:
    metadata:
      labels:
        app: capstone
 
    spec:
      containers:
      - name: capstone-container
        image: 136455701640.dkr.ecr.us-east-2.amazonaws.com/capstone-app:latest
 
        ports:
        - containerPort: 80
